name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # ──────────────────────────────────────────────────────────────
  # Job 1: Validate skill structure + DB layer (no secrets needed)
  # ──────────────────────────────────────────────────────────────
  validate:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: swarm
          POSTGRES_PASSWORD: swarmtest
          POSTGRES_DB: swarm
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SWARM_PG_DSN: "host=localhost port=5432 dbname=swarm user=swarm password=swarmtest"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install psycopg2-binary rich inotify_simple

      - name: Create bash wrappers (tests onboarding flow)
        run: |
          SWARM_ROOT="$(pwd)"
          SCRIPTS_PARENT="$SWARM_ROOT/.claude/skills/claude-swarm"
          DSN="$SWARM_PG_DSN"
          mkdir -p ~/.local/bin
          for cmd in spawn wait expert logs cancel clean status doctor; do
          cat > ~/.local/bin/swarm-$cmd << WRAPPER
          #!/usr/bin/env bash
          export SWARM_PG_DSN="\${SWARM_PG_DSN:-$DSN}"
          exec python3 -c "
          import sys
          sys.path.insert(0, '$SCRIPTS_PARENT')
          from scripts.${cmd} import main
          main()
          " "\$@"
          WRAPPER
          chmod +x ~/.local/bin/swarm-$cmd
          done
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          echo "Wrappers: $(ls ~/.local/bin/swarm-* | xargs -n1 basename | tr '\n' ' ')"

      - name: Validate skill structure
        run: |
          test -f .claude/skills/claude-swarm/SKILL.md \
            || { echo "ERROR: SKILL.md missing"; exit 1; }
          python3 - <<'EOF'
          content = open(".claude/skills/claude-swarm/SKILL.md").read()
          assert content.startswith("---"), "SKILL.md missing YAML frontmatter"
          import re
          front = content.split("---")[1]
          assert re.search(r"^name:", front, re.M), "SKILL.md missing 'name:'"
          assert re.search(r"^description:", front, re.M), "SKILL.md missing 'description:'"
          print("SKILL.md structure OK")
          EOF

      - name: Initialize schema
        run: |
          python3 -c "
          import sys; sys.path.insert(0, '.claude/skills/claude-swarm')
          from scripts import db
          db.init_schema()
          print('Schema ready')
          "

      - name: DB round-trip test
        run: |
          python3 - <<'EOF'
          import sys; sys.path.insert(0, ".claude/skills/claude-swarm")
          from scripts import db

          # Basic lifecycle
          tid = db.create_task("ci validation task")
          assert db.get_task(tid)["status"] == "pending"

          db.set_running(tid)
          assert db.get_task(tid)["status"] == "running"

          db.set_done(tid, "ok")
          task = db.get_task(tid)
          assert task["status"] == "done"
          assert task["output"] == "ok"

          # Parent-child
          child_id = db.create_task("child", parent_id=tid)
          assert str(db.get_task(child_id)["parent_id"]) == tid

          assert len(db.list_tasks(5)) > 0
          print("DB round-trip OK")
          EOF

      - name: Run unit + integration tests
        run: python3 tests/e2e_test.py

  # ──────────────────────────────────────────────────────────────
  # Job 2: Full skill e2e with Claude Code CLI + real LLM calls.
  # Uses OpenRouter (Sonnet 4.6) via ANTHROPIC_BASE_URL.
  # Skipped on fork PRs that don't have access to secrets.
  # ──────────────────────────────────────────────────────────────
  skill-test:
    runs-on: ubuntu-latest
    needs: validate
    if: ${{ vars.RUN_SKILL_TEST == 'true' || github.event_name == 'push' }}

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: swarm
          POSTGRES_PASSWORD: swarmtest
          POSTGRES_DB: swarm
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SWARM_PG_DSN: "host=localhost port=5432 dbname=swarm user=swarm password=swarmtest"
      ANTHROPIC_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      ANTHROPIC_BASE_URL: https://openrouter.ai/api/v1
      CLAUDE_MODEL: anthropic/claude-sonnet-4.6

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install system dependencies
        run: sudo apt-get install -y tmux

      - name: Install Python dependencies
        run: pip install psycopg2-binary rich inotify_simple

      - name: Create bash wrappers
        run: |
          SWARM_ROOT="$(pwd)"
          SCRIPTS_PARENT="$SWARM_ROOT/.claude/skills/claude-swarm"
          DSN="$SWARM_PG_DSN"
          mkdir -p ~/.local/bin
          for cmd in spawn wait expert logs cancel clean status doctor; do
          cat > ~/.local/bin/swarm-$cmd << WRAPPER
          #!/usr/bin/env bash
          export SWARM_PG_DSN="\${SWARM_PG_DSN:-$DSN}"
          exec python3 -c "
          import sys
          sys.path.insert(0, '$SCRIPTS_PARENT')
          from scripts.${cmd} import main
          main()
          " "\$@"
          WRAPPER
          chmod +x ~/.local/bin/swarm-$cmd
          done
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Initialize schema
        run: |
          python3 -c "
          import sys; sys.path.insert(0, '.claude/skills/claude-swarm')
          from scripts import db
          db.init_schema()
          print('Schema ready')
          "

      - name: Verify skill visible to Claude Code
        run: |
          claude --version
          test -f .claude/skills/claude-swarm/SKILL.md
          echo "claude-swarm skill present"

      - name: swarm-doctor check
        run: |
          tmux new-session -d -s swarm 2>/dev/null || true
          swarm-doctor
        continue-on-error: true

      - name: Run skill e2e tests
        run: python3 tests/test_swarm_e2e.py
